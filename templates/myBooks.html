<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园书递 - 我的书籍</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="/static/css/myBooks.css?v=1.0" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa fa-book"></i> 校园书递
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/booksList">全部书籍</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/publishBook">
                            <i class="fa fa-plus-circle text-primary"></i> 发布书籍
                        </a>
                    </li>
                </ul>
                <div id="userMenu" class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fa fa-user text-primary"></i> <span id="username">我的账户</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/personalCenter">个人中心</a></li>
                        <li><a class="dropdown-item" href="/myBooks">我的书籍</a></li>
                        <li><a class="dropdown-item" href="/myCollections">我的收藏</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/login"><i class="fa fa-lock"></i> 管理员登录</a></li>
                        <li><a class="dropdown-item" href="#" id="logoutBtn">退出登录</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container section-container">
        <h2 class="section-title">我的书籍</h2>
        <a href="/publishBook" class="btn-publish">
            <i class="fa fa-plus"></i> 发布新书籍
        </a>
        
        <div class="book-list" id="myBooksContainer">
            <!-- 书籍列表将通过JS动态生成 -->
        </div>
    </div>

    <!-- 先引入jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 然后引入Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入通用JS文件（必须在myBooks.js之前） -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <!-- 引入全局JS文件 -->
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <!-- 引入主JS文件 -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!-- 引入页面JS文件 -->
    <script src="{{ url_for('static', filename='js/myBooks.js') }}"></script>
</body>
</html>

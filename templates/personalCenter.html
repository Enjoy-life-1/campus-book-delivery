<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园书递 - 个人中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/personalCenter.css?v=1.0">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa fa-book"></i> 校园书递
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/booksList">全部书籍</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/publishBook">发布书籍</a>
                    </li>
                </ul>
                <div class="navbar-nav" id="userMenu">
                    <!-- 登录状态由JS动态生成 -->
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <i class="fa fa-user text-primary"></i> 登录/注册
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/login">登录</a></li>
                        <li><a class="dropdown-item" href="/register">注册</a></li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item" href="/login"><i class="fa fa-lock"></i> 管理员登录</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- 导航栏下方分割线 -->
    <div class="container">
        <div class="divider-line-top"></div>
    </div>

    <div class="personal-container">
        <div class="personal-header">
            <div class="avatar-container">
                <div class="avatar">
                    <img id="userAvatar" src="" alt="用户头像" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                    <i class="fa fa-user" id="avatarIcon"></i>
                </div>
            </div>
            <div class="user-info">
                <h2 class="username" id="userName">加载中...</h2>
                <div class="user-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="publishedCount">0</div>
                        <div class="stat-label">已发布</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="soldCount">0</div>
                        <div class="stat-label">已售出</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="collectedCount">0</div>
                        <div class="stat-label">我的收藏</div>
                    </div>
                </div>
                <button class="edit-profile">
                   <a href="/accountSettings" class="edit-profile">
                     <i class="fa fa-pencil"></i> 编辑资料
                    </a>
                </button>
            </div>
        </div>

        <!-- 个人信息下方分割线 -->
        <div class="divider-line-section"></div>

        <div class="personal-menu">
            <a href="/myBooks" class="menu-card">
                <div class="menu-icon">
                    <i class="fa fa-book"></i>
                </div>
                <div class="menu-info">
                    <h5>我的书籍</h5>
                    <p>管理已发布的书籍</p>
                </div>
            </a>
            <a href="/myCollections" class="menu-card">
                <div class="menu-icon">
                    <i class="fa fa-star"></i>
                </div>
                <div class="menu-info">
                    <h5>我的收藏</h5>
                    <p>查看收藏的书籍</p>
                </div>
            </a>
            <a href="/cart" class="menu-card">
                <div class="menu-icon">
                    <i class="fa fa-shopping-bag"></i>
                </div>
                <div class="menu-info">
                    <h5>购物车</h5>
                    <p>查看购物车商品</p>
                </div>
            </a>
            <a href="/transactionHistory" class="menu-card">
                <div class="menu-icon">
                    <i class="fa fa-exchange"></i>
                </div>
                <div class="menu-info">
                    <h5>我的交易</h5>
                    <p>查看和管理交易</p>
                </div>
            </a>
            <a href="/orderDetails" class="menu-card">
                <div class="menu-icon">
                    <i class="fa fa-file-text-o"></i>
                </div>
                <div class="menu-info">
                    <h5>订单详情</h5>
                    <p>查看订单详细信息</p>
                </div>
            </a>
            <a href="/accountSettings" class="menu-card">
                <div class="menu-icon">
                    <i class="fa fa-cog"></i>
                </div>
                <div class="menu-info">
                    <h5>账户设置</h5>
                    <p>账户相关设置</p>
                </div>
            </a>
        </div>

        <!-- 菜单下方分割线 -->
        <div class="divider-line-section"></div>

        <div class="recent-books">
            <div class="section-title">
                <span>我的书籍</span>
                <a href="/myBooks">查看全部</a>
            </div>
            <div id="recentBooksContainer">
                <!-- 最近书籍将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 先引入jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 然后引入Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入通用JS文件（必须在personalCenter.js之前） -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <!-- 引入全局JS文件 -->
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <!-- 引入主JS文件 -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!-- 引入页面JS文件 -->
    <script src="{{ url_for('static', filename='js/personalCenter.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园书递 - 注册</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/variables.css', v='1.0') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/base.css', v='1.0') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/register.css', v='1.0') }}" rel="stylesheet">
</head>
<body>
    <div class="register-container">
        <!-- 左侧品牌区域 -->
        <div class="brand-side">
            <div class="brand-logo">
                <img src="../static/img/logo.png" alt="校园书递Logo">
            </div>
            <h1 class="brand-title">校园书递</h1>
            <div class="brand-slogan">
                专注于校园二手书籍交易，让闲置教材焕发新价值<br>
                为大学生提供安全、便捷、高效的书籍交易平台
            </div>
            <div class="brand-illustration">
                <img src="../static/img/520.jpg" alt="书籍交易插图">
            </div>
        </div>

        <!-- 右侧表单区域 -->
        <div class="form-side">
            <div class="form-header">
                <h2>创建账号</h2>
                <p>填写以下信息完成注册</p>
            </div>

            <!-- 注册表单 -->
            <form class="register-form" id="registerForm">
                <div class="form-group">
                    <label for="username">用户名 <span class="text-danger">*</span></label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="请输入用户名" required>
                    <div class="invalid-feedback" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label for="phone">手机号码 <span class="text-danger">*</span></label>
                    <input type="tel" id="phone" name="phone" class="form-control" placeholder="请输入11位手机号码" required maxlength="11">
                    <div class="invalid-feedback" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label for="verifyCode">验证码 <span class="text-danger">*</span></label>
                    <div class="verification-code">
                        <input type="text" id="verifyCode" name="verifyCode" class="form-control" placeholder="请输入6位验证码" required maxlength="6">
                        <button type="button" class="send-code-btn" id="sendCodeBtn">获取验证码</button>
                    </div>
                    <div class="invalid-feedback" style="display: none;"></div>
                </div>

                <div class="form-group">
                    <label for="password">设置密码 <span class="text-danger">*</span></label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="请设置密码（至少6位）" required>
                    <div class="invalid-feedback" style="display: none;"></div>
                </div>

                <button type="submit" class="register-btn" aria-label="立即注册">
                    <i class="fa fa-user-plus"></i> 立即注册
                </button>
                
                <p class="register-prompt">
                    已有账号？<a href="/login">立即登录</a>
                </p>
            </form>
        </div>
    </div>

    <!-- 引入jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 引入Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入通用JS文件 -->
    <script src="../static/js/common.js"></script>
    <!-- 引入主JS文件 -->
    <script src="../static/js/main.js"></script>
    <!-- 引入页面JS文件 -->
    <script src="../static/js/register.js"></script>
</body>
</html>

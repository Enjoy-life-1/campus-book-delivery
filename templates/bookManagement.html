<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍管理 - 管理员控制台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/variables.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/global.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/admin.css') }}?v=2.0" rel="stylesheet">
</head>
<body class="admin-body">
    <!-- 侧边栏导航 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="校园书递" class="sidebar-logo">
            <span class="sidebar-title">校园书递</span>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="{{ url_for('admin_page') }}" class="nav-link">
                        <i class="fa fa-dashboard"></i>
                        <span>控制台</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="{{ url_for('admin_book_management_page') }}" class="nav-link">
                        <i class="fa fa-book"></i>
                        <span>书籍管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_user_management_page') }}" class="nav-link">
                        <i class="fa fa-users"></i>
                        <span>用户管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_analytics_page') }}" class="nav-link">
                        <i class="fa fa-bar-chart"></i>
                        <span>数据分析</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_settings_page') }}" class="nav-link">
                        <i class="fa fa-cog"></i>
                        <span>系统设置</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- 顶部导航栏 -->
    <header class="top-navbar">
        <div class="header-left">
            <button class="sidebar-toggle">
                <i class="fa fa-bars"></i>
            </button>
            <div class="brand-container">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="校园书递" class="logo-btn">
                <span class="page-title">书籍管理</span>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="管理员头像" class="avatar">
                <span class="username">{{ username }}</span>
                <i class="fa fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main-content">
        <div class="container-fluid">
            <!-- 页面标题和操作按钮 -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1">书籍管理</h2>
                    <p class="text-muted mb-0">管理系统书籍信息</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('admin_page') }}" class="btn btn-outline-secondary">
                        <i class="fa fa-arrow-left me-2"></i>返回控制台
                    </a>
                    <button class="btn btn-primary" id="addBookBtn" onclick="openAddBookModal()">
                        <i class="fa fa-plus me-2"></i>添加书籍
                    </button>
                </div>
            </div>

            <!-- 搜索筛选区域 -->
            <div class="search-filter">
                <div class="filter-row">
                    <div class="filter-group">
                        <select id="bookCategoryFilter" class="filter-select">
                            <option value="all">全部分类</option>
                            <option value="教材教辅">教材教辅</option>
                            <option value="考研资料">考研资料</option>
                            <option value="文学小说">文学小说</option>
                            <option value="专业书籍">专业书籍</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <select id="priceRangeFilter" class="filter-select">
                            <option value="all">全部价格</option>
                            <option value="0-50">0-50元</option>
                            <option value="50-100">50-100元</option>
                            <option value="100+">100元以上</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <select id="statusFilter" class="filter-select">
                            <option value="all">全部状态</option>
                            <option value="available">在售</option>
                            <option value="sold">已售出</option>
                        </select>
                    </div>
                    <div class="search-input-group">
                        <input type="text" id="bookSearchInput" placeholder="输入书名、作者或卖家" class="search-input">
                        <button class="search-btn" onclick="filterBooks()">
                            <i class="fa fa-search"></i> 搜索
                        </button>
                    </div>
                </div>
            </div>

            <!-- 书籍列表 -->
            <div class="content-area">
                <div class="data-table">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>书名</th>
                                <th>作者</th>
                                <th>分类</th>
                                <th>价格</th>
                                <th>状态</th>
                                <th>卖家</th>
                                <th>发布时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="booksTableBody">
                            <!-- 书籍数据将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
                <div id="booksTableEmpty" class="empty-state">
                    <div class="stat-card empty-state-card">
                        <div class="stat-icon primary">
                            <i class="fa fa-search"></i>
                        </div>
                        <div class="stat-info">
                            <h3>未找到符合条件的书籍</h3>
                            <p>尝试调整筛选条件或搜索其他关键词</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 查看书籍详情模态框 -->
    <div class="modal" id="view-book-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">书籍详情</h3>
                <button class="close-modal" onclick="closeModal('view-book-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="bookDetailContent">
                    <p>加载中...</p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('view-book-modal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- 添加书籍模态框 -->
    <div class="modal" id="add-book-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">添加书籍</h3>
                <button class="close-modal" onclick="closeModal('add-book-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-book-form">
                    <div class="form-group">
                        <label>书名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="addBookTitle" required placeholder="请输入书名">
                    </div>
                    <div class="form-group">
                        <label>作者 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="addBookAuthor" required placeholder="请输入作者">
                    </div>
                    <div class="form-group">
                        <label>分类 <span class="text-danger">*</span></label>
                        <select class="form-control" id="addBookCategory" required>
                            <option value="">请选择分类</option>
                            <option value="教材教辅">教材教辅</option>
                            <option value="考研资料">考研资料</option>
                            <option value="文学小说">文学小说</option>
                            <option value="专业书籍">专业书籍</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>价格 <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="addBookPrice" step="0.01" min="0" required placeholder="请输入价格">
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea class="form-control" id="addBookDescription" rows="3" placeholder="请输入书籍描述（可选）"></textarea>
                    </div>
                    <div class="form-group">
                        <label>封面图片URL</label>
                        <input type="text" class="form-control" id="addBookCoverUrl" placeholder="请输入封面图片URL（可选）">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('add-book-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitAddBookForm()">添加</button>
            </div>
        </div>
    </div>

    <!-- 编辑书籍模态框 -->
    <div class="modal" id="edit-book-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">编辑书籍</h3>
                <button class="close-modal" onclick="closeModal('edit-book-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-book-form">
                    <input type="hidden" id="editBookId">
                    <div class="form-group">
                        <label>书名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="editBookTitle" required>
                    </div>
                    <div class="form-group">
                        <label>作者 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="editBookAuthor" required>
                    </div>
                    <div class="form-group">
                        <label>分类 <span class="text-danger">*</span></label>
                        <select class="form-control" id="editBookCategory" required>
                            <option value="">请选择分类</option>
                            <option value="教材教辅">教材教辅</option>
                            <option value="考研资料">考研资料</option>
                            <option value="文学小说">文学小说</option>
                            <option value="专业书籍">专业书籍</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>价格 <span class="text-danger">*</span></label>
                        <input type="number" class="form-control" id="editBookPrice" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea class="form-control" id="editBookDescription" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label>封面图片URL</label>
                        <input type="text" class="form-control" id="editBookCoverUrl" placeholder="请输入封面图片URL">
                    </div>
                    <div class="form-group">
                        <label>状态</label>
                        <select class="form-control" id="editBookStatus" required>
                            <option value="available">在售</option>
                            <option value="sold">已售出</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('edit-book-modal')">取消</button>
                <button class="btn btn-primary" onclick="submitEditBookForm()">保存</button>
            </div>
        </div>
    </div>

    <!-- 删除书籍模态框 -->
    <div class="modal" id="delete-book-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">确认删除</h3>
                <button class="close-modal" onclick="closeModal('delete-book-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <p id="deleteBookMessage">确定要删除这本书籍吗？此操作不可撤销。</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('delete-book-modal')">取消</button>
                <button class="btn btn-danger" id="delete-confirm-btn">确认删除</button>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入全局JavaScript文件 -->
    <script src="{{ url_for('static', filename='js/global.js') }}" defer></script>
    <!-- 引入通用功能模块 -->
    <script src="{{ url_for('static', filename='js/common.js') }}" defer></script>
    
    <script>
        // HTML转义函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 关闭模态框函数
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('active');
            }
        }
        
        // 点击模态框外部关闭
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', function(e) {
                if (e.target === this) {
                    this.classList.remove('active');
                }
            });
        });
        
        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
        
        // 分类映射：中文到英文代码
        const categoryMap = {
            '教材教辅': 'textbook',
            '考研资料': 'postgraduate',
            '文学小说': 'literature',
            '专业书籍': 'professional',
            '其他': 'other'
        };
        
        // 反向映射：英文到中文
        const reverseCategoryMap = {
            'textbook': '教材教辅',
            'postgraduate': '考研资料',
            'literature': '文学小说',
            'professional': '专业书籍',
            'other': '其他'
        };
        
        // 加载书籍列表
        async function filterBooks() {
            const search = document.getElementById('bookSearchInput')?.value || '';
            const category = document.getElementById('bookCategoryFilter')?.value || 'all';
            const priceRange = document.getElementById('priceRangeFilter')?.value || 'all';
            const status = document.getElementById('statusFilter')?.value || 'all';
            
            console.log('筛选条件:', { category, priceRange, status, search });
            
            // 构建搜索参数 - 获取所有书籍，然后在前端筛选
            const params = new URLSearchParams();
            params.append('page', '1');
            params.append('page_size', '10000');
            params.append('include_sold', 'true'); // 管理员需要看到所有书籍
            if (search) params.append('search', search);
            // 不在这里传递category，因为需要同时匹配中文和英文
            
            try {
                const response = await fetch(`/api/books?${params.toString()}`, {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('获取书籍数据失败');
                }
                
                const result = await response.json();
                let books = result.books || [];
                
                console.log('加载的书籍总数:', books.length);
                if (books.length > 0) {
                    const uniqueCategories = [...new Set(books.map(b => b.category).filter(c => c))];
                    console.log('数据库中所有唯一的分类:', uniqueCategories);
                }
                
                // 分类筛选 - 支持中文和英文两种格式
                if (category && category !== 'all') {
                    const categoryCode = categoryMap[category] || category;
                    const categoryName = reverseCategoryMap[category] || category;
                    
                    books = books.filter(book => {
                        const bookCategory = book.category || '';
                        return bookCategory === category || 
                               bookCategory === categoryCode || 
                               bookCategory === categoryName;
                    });
                    console.log('分类筛选后:', books.length, '本书');
                }
                
                // 价格范围筛选
                if (priceRange && priceRange !== 'all') {
                    books = books.filter(book => {
                        const price = parseFloat(book.price || 0);
                        if (priceRange === '0-50') return price >= 0 && price <= 50;
                        if (priceRange === '50-100') return price > 50 && price <= 100;
                        if (priceRange === '100+') return price > 100;
                        return true;
                    });
                }
                
                // 状态筛选
                if (status && status !== 'all') {
                    books = books.filter(book => book.status === status);
                }
                
                console.log('最终筛选结果:', books.length, '本书');
                
                const bookTableBody = document.getElementById('booksTableBody');
                const emptyState = document.getElementById('booksTableEmpty');
                
                if (bookTableBody) {
                    if (books.length === 0) {
                        bookTableBody.innerHTML = '';
                        if (emptyState) {
                            emptyState.classList.add('active');
                        }
                        return;
                    }
                    
                    if (emptyState) {
                        emptyState.classList.remove('active');
                    }
                    
                    let html = '';
                    books.forEach(book => {
                        // 使用common.js中的函数
                        const categoryName = typeof getCategoryName === 'function' ? getCategoryName(book.category) : (book.category || '其他');
                        const statusText = typeof getStatusText === 'function' ? getStatusText(book.status) : (book.status === 'available' ? '在售' : '已售出');
                        const statusClass = book.status === 'available' ? 'success' : 'secondary';
                        
                        html += `
                            <tr>
                                <td>${escapeHtml(book.id || '')}</td>
                                <td>${escapeHtml(book.title || '')}</td>
                                <td>${escapeHtml(book.author || '')}</td>
                                <td>${escapeHtml(categoryName)}</td>
                                <td>¥${parseFloat(book.price || 0).toFixed(2)}</td>
                                <td><span class="badge bg-${statusClass}">${statusText}</span></td>
                                <td>${escapeHtml(book.owner_name || book.seller || '')}</td>
                                <td>${escapeHtml(book.created_at || book.createTime || '')}</td>
                                <td>
                                    <div class="action-buttons">
                                        <button class="action-btn-small view" title="查看" onclick="viewBook('${book.id}')">
                                            <i class="fas fa-eye"></i>
                                        </button>
                                        <button class="action-btn-small edit" title="编辑" onclick="editBook('${book.id}')">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="action-btn-small delete" title="删除" onclick="deleteBook('${book.id}')">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                    
                    bookTableBody.innerHTML = html;
                }
            } catch (error) {
                console.error('加载书籍失败:', error);
                alert('加载书籍数据失败，请稍后重试');
            }
        }
        
        // 查看书籍详情
        async function viewBook(id) {
            try {
                const response = await fetch(`/api/books/${id}`, {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('获取书籍详情失败');
                }
                
                const result = await response.json();
                const book = result.book;
                
                if (!book) {
                    alert('书籍不存在');
                    return;
                }
                
                const modal = document.getElementById('view-book-modal');
                const content = document.getElementById('bookDetailContent');
                
                content.innerHTML = `
                    <div style="line-height: 1.8;">
                        <p><strong>ID:</strong> ${escapeHtml(book.id || '')}</p>
                        <p><strong>书名:</strong> ${escapeHtml(book.title || '')}</p>
                        <p><strong>作者:</strong> ${escapeHtml(book.author || '')}</p>
                        <p><strong>分类:</strong> ${escapeHtml(typeof getCategoryName === 'function' ? getCategoryName(book.category) : (book.category || '其他'))}</p>
                        <p><strong>价格:</strong> ¥${parseFloat(book.price || 0).toFixed(2)}</p>
                        <p><strong>状态:</strong> ${typeof getStatusText === 'function' ? getStatusText(book.status) : (book.status === 'available' ? '在售' : '已售出')}</p>
                        <p><strong>卖家:</strong> ${escapeHtml(book.owner_name || '')}</p>
                        <p><strong>发布时间:</strong> ${escapeHtml(book.created_at || '')}</p>
                        ${book.cover_url ? `<p><strong>封面:</strong><br><img src="${escapeHtml(book.cover_url)}" style="max-width: 200px; margin-top: 10px;"></p>` : ''}
                        <p><strong>描述:</strong></p>
                        <p style="background: #f5f5f5; padding: 10px; border-radius: 4px; margin-top: 5px;">
                            ${escapeHtml(book.description || '暂无描述')}
                        </p>
                    </div>
                `;
                
                modal.classList.add('active');
            } catch (error) {
                console.error('查看书籍失败:', error);
                alert('获取书籍详情失败，请稍后重试');
            }
        }
        
        // 编辑书籍
        async function editBook(id) {
            try {
                const response = await fetch(`/api/books/${id}`, {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('获取书籍详情失败');
                }
                
                const result = await response.json();
                const book = result.book;
                
                if (!book) {
                    alert('书籍不存在');
                    return;
                }
                
                // 填充表单
                document.getElementById('editBookId').value = book.id;
                document.getElementById('editBookTitle').value = book.title || '';
                document.getElementById('editBookAuthor').value = book.author || '';
                document.getElementById('editBookCategory').value = book.category || '其他';
                document.getElementById('editBookPrice').value = book.price || 0;
                document.getElementById('editBookDescription').value = book.description || '';
                document.getElementById('editBookCoverUrl').value = book.cover_url || '';
                document.getElementById('editBookStatus').value = book.status || 'available';
                
                // 显示模态框
                document.getElementById('edit-book-modal').classList.add('active');
            } catch (error) {
                console.error('编辑书籍失败:', error);
                alert('获取书籍详情失败，请稍后重试');
            }
        }
        
        // 删除书籍
        function deleteBook(id) {
            const modal = document.getElementById('delete-book-modal');
            const message = document.getElementById('deleteBookMessage');
            
            // 存储要删除的书籍ID
            modal.dataset.bookId = id;
            message.textContent = '确定要删除这本书籍吗？此操作不可撤销。';
            
            modal.classList.add('active');
        }
        
        // 确认删除书籍
        document.getElementById('delete-confirm-btn').addEventListener('click', async function() {
            const modal = document.getElementById('delete-book-modal');
            const bookId = modal.dataset.bookId;
            
            if (!bookId) {
                return;
            }
            
            try {
                const response = await fetch(`/api/books/${bookId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    alert('书籍删除成功');
                    closeModal('delete-book-modal');
                    filterBooks(); // 重新加载书籍列表
                } else {
                    alert('删除失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('删除书籍失败:', error);
                alert('删除书籍时发生错误，请稍后重试');
            }
        });
        
        // 打开添加书籍模态框
        function openAddBookModal() {
            const modal = document.getElementById('add-book-modal');
            const form = document.getElementById('add-book-form');
            if (modal) {
                if (form) form.reset();
                modal.classList.add('active');
            }
        }
        
        // 提交添加书籍表单
        async function submitAddBookForm() {
            const form = document.getElementById('add-book-form');
            if (!form) return;
            
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            const title = document.getElementById('addBookTitle').value.trim();
            const author = document.getElementById('addBookAuthor').value.trim();
            const category = document.getElementById('addBookCategory').value;
            const price = document.getElementById('addBookPrice').value;
            const description = document.getElementById('addBookDescription').value.trim();
            const coverUrl = document.getElementById('addBookCoverUrl').value.trim();
            
            if (!title || !author || !category || !price) {
                alert('请填写所有必填字段');
                return;
            }
            
            try {
                const response = await fetch('/api/books', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        title: title,
                        author: author,
                        category: category,
                        price: parseFloat(price),
                        description: description,
                        cover_url: coverUrl
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    closeModal('add-book-modal');
                    form.reset();
                    await filterBooks();
                    alert('书籍添加成功！');
                } else {
                    alert('添加失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('添加书籍失败:', error);
                alert('添加书籍时发生错误，请稍后重试');
            }
        }
        
        // 提交编辑书籍表单
        async function submitEditBookForm() {
            const form = document.getElementById('edit-book-form');
            if (!form) return;
            
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            const bookId = document.getElementById('editBookId').value;
            const title = document.getElementById('editBookTitle').value.trim();
            const author = document.getElementById('editBookAuthor').value.trim();
            const category = document.getElementById('editBookCategory').value;
            const price = document.getElementById('editBookPrice').value;
            const description = document.getElementById('editBookDescription').value.trim();
            const coverUrl = document.getElementById('editBookCoverUrl').value.trim();
            const status = document.getElementById('editBookStatus').value;
            
            if (!title || !author || !category || !price) {
                alert('请填写所有必填字段');
                return;
            }
            
            try {
                const response = await fetch(`/api/books/${bookId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        title: title,
                        author: author,
                        category: category,
                        price: parseFloat(price),
                        description: description,
                        cover_url: coverUrl,
                        status: status
                    })
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    alert('书籍更新成功');
                    closeModal('edit-book-modal');
                    await filterBooks();
                } else {
                    alert('更新失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('更新书籍失败:', error);
                alert('更新书籍时发生错误，请稍后重试');
            }
        }
        
        // 实时搜索
        const bookSearchInput = document.getElementById('bookSearchInput');
        if (bookSearchInput) {
            bookSearchInput.addEventListener('input', debounce(() => {
                filterBooks();
            }, 300));
            
            bookSearchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    filterBooks();
                }
            });
        }
        
        // 筛选器变化时自动搜索
        document.getElementById('bookCategoryFilter').addEventListener('change', filterBooks);
        document.getElementById('priceRangeFilter').addEventListener('change', filterBooks);
        document.getElementById('statusFilter').addEventListener('change', filterBooks);
        
        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            filterBooks();
        });
    </script>
</body>
</html>

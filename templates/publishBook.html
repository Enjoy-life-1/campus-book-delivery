<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园书递 - 发布书籍</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="/static/css/publishBook.css?v=1.0" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa fa-book"></i> 校园书递
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/booksList">全部书籍</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            书籍分类
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/booksList?category=textbook">教材教辅</a></li>
                            <li><a class="dropdown-item" href="/booksList?category=postgraduate">考研资料</a></li>
                            <li><a class="dropdown-item" href="/booksList?category=literature">文学小说</a></li>
                            <li><a class="dropdown-item" href="/booksList?category=professional">专业书籍</a></li>
                            <li><a class="dropdown-item" href="/booksList?category=other">其他书籍</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/guide">交易指南</a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <a class="nav-link me-3 active" href="/publishBook">
                        <i class="fa fa-plus-circle text-primary"></i> 发布书籍
                    </a>
                    <div id="userMenu" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa fa-user text-primary"></i> 登录/注册
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/login">登录</a></li>
                            <li><a class="dropdown-item" href="/register">注册</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/login"><i class="fa fa-lock"></i> 管理员登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 导航栏下方分割线 -->
    <div class="container">
        <div class="divider-line-top"></div>
    </div>

    <div class="publish-section">
        <h2 class="publish-title">发布闲置书籍</h2>
        <div class="form-container">
        <form id="publishForm">
            <div class="mb-3">
                <label for="bookTitle" class="form-label">书籍标题 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="bookTitle" placeholder="如：九成新考研数学真题集、Python编程从入门到实践（第二版）">
            </div>
            <div class="mb-3">
                <label for="bookCategory" class="form-label">书籍分类 <span class="text-danger">*</span></label>
                <select class="form-control" id="bookCategory">
                    <option value="">请选择分类</option>
                    <option value="textbook">教材教辅</option>
                    <option value="postgraduate">考研资料</option>
                    <option value="literature">文学小说</option>
                    <option value="professional">专业书籍</option>
                    <option value="other">其他书籍</option>
                </select>
            </div>
            <div class="mb-3">
                <label for="bookAuthor" class="form-label">书籍作者（选填）</label>
                <input type="text" class="form-control" id="bookAuthor" placeholder="如：张宇、曼昆">
            </div>
            <div class="mb-3">
                <label for="bookPrice" class="form-label">书籍价格（元） <span class="text-danger">*</span></label>
                <input type="number" step="0.01" min="0.01" class="form-control" id="bookPrice" placeholder="请输入书籍价格">
            </div>
            <div class="mb-3">
                <label for="bookDesc" class="form-label">书籍描述 <span class="text-danger">*</span></label>
                <textarea class="form-control form-textarea" id="bookDesc" placeholder="请详细描述书籍情况（新旧程度、是否有瑕疵、是否有笔记、购买时间等）"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">上传书籍图片 <span class="text-danger">*</span></label>
                <div class="image-upload">
                    <input type="file" class="form-control" id="img1" accept="image/*">
                    <input type="file" class="form-control" id="img2" accept="image/*">
                    <input type="file" class="form-control" id="img3" accept="image/*">
                </div>
                <p class="text-muted" style="margin-top: 0.5rem; font-size: 0.9rem;">最多上传3张图片，清晰的图片能更快卖出哦</p>
                
                <!-- 图片预览区域 -->
                <div class="image-preview-container" id="imagePreviewContainer"></div>
            </div>
            <div class="mb-3">
                <label for="contactInfo" class="form-label">联系方式 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="contactInfo" placeholder="请填写手机号或微信，方便买家联系您">
            </div>
            <button type="submit" class="btn-publish">发布书籍</button>
        </form>
        </div>
    </div>

    <!-- 先引入jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 然后引入Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script src="{{ url_for('static', filename='js/publishBook.js') }}"></script>
</body>
</html>

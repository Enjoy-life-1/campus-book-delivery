<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>书籍详情详情 - 校园书递</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/variables.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/base.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/navbar.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/book1.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/comments.css') }}?v=1.0" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa fa-book"></i> 校园书递
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/booksList">全部书籍</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            书籍分类
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="/booksList?category=textbook">教材教辅</a></li>
                            <li><a class="dropdown-item" href="/booksList?category=postgraduate">考研资料</a></li>
                            <li><a class="dropdown-item" href="/booksList?category=literature">文学小说</a></li>
                            <li><a class="dropdown-item" href="/booksList?category=professional">专业书籍</a></li>
                            <li><a class="dropdown-item" href="/booksList?category=other">其他书籍</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/guide">交易指南</a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <a class="nav-link me-3" href="/publishBook">
                        <i class="fa fa-plus-circle text-primary"></i> 发布书籍
                    </a>
                    <div id="userMenu" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa fa-user text-primary"></i> 登录/注册
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/login">登录</a></li>
                            <li><a class="dropdown-item" href="/register">注册</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/login"><i class="fa fa-lock"></i> 管理员登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 书籍详情区域 -->
    <div class="book-detail-section">
        <div class="container">
            <div class="book-card">
                <div class="row">
                    <!-- 书籍图片 -->
                    <div class="col-md-4">
                        <img id="bookImage" src="" alt="书籍封面" class="book-image">
                    </div>
                    
                    <!-- 书籍信息 -->
                    <div class="col-md-8">
                        <div class="book-info">
                            <h1 class="book-title" id="bookTitle"></h1>
                            <p class="book-author" id="bookAuthor"></p>
                            
                            <div class="book-meta">
                                <div class="meta-item">
                                    <i class="fa fa-tag"></i>
                                    <span id="bookCategory"></span>
                                </div>
                                <div class="meta-item">
                                    <i class="fa fa-calendar"></i>
                                    <span id="bookPublishTime"></span>
                                </div>
                                <div class="meta-item">
                                    <i class="fa fa-user"></i>
                                    <span id="bookSeller"></span>
                                </div>
                                <div class="meta-item">
                                    <i class="fa fa-flag"></i>
                                    <span id="bookStatus"></span>
                                </div>
                            </div>
                            
                            <div class="book-price">
                                ￥<span id="bookPrice"></span>
                            </div>
                            <div class="book-description">
                                <h5>书籍简介</h5>
                                <p id="bookDescription"></p>
                            </div>
                            
                            <div class="book-actions">
                                <button class="btn-contact" id="contactSellerBtn">
                                    <i class="fa fa-comments"></i> 联系卖家
                                </button>
                                <button class="btn-collect" id="collectBtn">
                                    <i class="fa fa-star-o"></i> 收藏书籍
                                </button>
                                <button class="btn-cart" id="addToCartBtn">
                                    <i class="fa fa-shopping-bag"></i> 加入购物车
                                </button>
                                <button class="btn-buy" id="buyBookBtn">
                                    <i class="fa fa-shopping-cart"></i> 购买书籍
                                </button>
                            </div>
                            
                            <div class="seller-info">
                                <h5><i class="fa fa-user-circle"></i> 卖家信息</h5>
                                <div class="meta-item">
                                    <i class="fa fa-user"></i>
                                    <span id="sellerName"></span>
                                </div>
                                <!-- 新增：显示卖家联系方式 -->
                                <div class="meta-item">
                                    <i class="fa fa-phone"></i>
                                    <span id="sellerContact"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 联系卖家模态框 -->
    <div class="modal fade contact-modal" id="contactModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">
                        <i class="fa fa-comments"></i> 与 <span id="modalSellerName"></span> 聊天
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="messageContainer">
                    <div class="message-container">
                        <!-- 消息内容将通过JS动态生成 -->
                        <div class="typing-indicator" id="typingIndicator" style="display: none;">
                            <div class="message-avatar">卖</div>
                            <div class="message-bubble">
                                <div class="typing-dots">
                                    <span></span>
                                    <span></span>
                                    <span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <div class="message-input-container w-100">
                        <!-- 快速回复按钮 -->
                        <div class="quick-replies" id="quickReplies">
                            <button class="quick-reply-btn" data-template="问价">这本书多少钱？</button>
                            <button class="quick-reply-btn" data-template="成色">书的新旧程度怎么样？</button>
                            <button class="quick-reply-btn" data-template="地点">在哪里可以看货？</button>
                            <button class="quick-reply-btn" data-template="购买">我想购买这本书</button>
                        </div>
                        <!-- 消息输入框 -->
                        <div class="message-input-wrapper">
                            <div class="message-input">
                                <input 
                                    type="text" 
                                    id="messageInput" 
                                    placeholder="输入消息... (Ctrl+Enter 发送)"
                                    autocomplete="off"
                                >
                                <div class="message-input-actions">
                                    <button class="input-action-btn" id="clearInputBtn" title="清空">
                                        <i class="fa fa-times"></i>
                                    </button>
                                </div>
                            </div>
                            <button id="sendMessageBtn" class="send-btn" title="发送 (Ctrl+Enter)">
                                <i class="fa fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 评论区域 -->
    <div class="comment-section-container">
        <div class="container">
            <div class="comment-section">
                <div class="comment-header">
                    <h4>
                        <i class="fa fa-comments"></i> 评论
                        <span class="comment-count" id="commentCount">(0)</span>
                    </h4>
                </div>

                <!-- 评论输入框 -->
                <div id="commentFormContainer" class="comment-form">
                    <div class="form-group">
                        <textarea
                            id="commentInput"
                            class="form-control"
                            rows="4"
                            placeholder="写下你的评论..."
                        ></textarea>
                    </div>
                    <div class="form-actions">
                        <button id="submitCommentBtn" class="btn btn-success">
                            <i class="fa fa-paper-plane"></i> 发表评论
                        </button>
                    </div>
                </div>

                <!-- 评论列表 -->
                <div id="commentsList" class="comments-list">
                    <div class="text-center py-4">
                        <div class="spinner-border text-success" role="status">
                            <span class="visually-hidden">加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 先引入jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 然后引入Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入通用JS文件 -->
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <!-- 引入主JS文件 -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <!-- 引入页面JS文件 -->
    <script src="{{ url_for('static', filename='js/book1.js') }}"></script>
    <!-- 引入评论JS文件 -->
    <script src="{{ url_for('static', filename='js/comments.js') }}"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户列表 - 管理员控制台</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 样式文件 -->
    <link href="{{ url_for('static', filename='css/variables.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/global.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/admin.css') }}?v=2.0" rel="stylesheet">
</head>
<body class="admin-body">
    <!-- 侧边栏导航 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="校园书递" class="sidebar-logo">
            <span class="sidebar-title">校园书递</span>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="{{ url_for('admin_page') }}" class="nav-link">
                        <i class="fa fa-dashboard"></i>
                        <span>控制台</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_book_management_page') }}" class="nav-link">
                        <i class="fa fa-book"></i>
                        <span>书籍管理</span>
                    </a>
                </li>
                <li class="nav-item active">
                    <a href="{{ url_for('admin_user_management_page') }}" class="nav-link">
                        <i class="fa fa-users"></i>
                        <span>用户管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_analytics_page') }}" class="nav-link">
                        <i class="fa fa-bar-chart"></i>
                        <span>数据分析</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_settings_page') }}" class="nav-link">
                        <i class="fa fa-cog"></i>
                        <span>系统设置</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- 顶部导航栏 -->
    <header class="top-navbar">
        <div class="header-left">
            <button class="sidebar-toggle">
                <i class="fa fa-bars"></i>
            </button>
            <div class="brand-container">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="校园书递" class="logo-btn">
                <span class="page-title">用户列表</span>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="管理员头像" class="avatar">
                <span class="username">{{ username }}</span>
                <i class="fa fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main-content">
        <div class="container-fluid">
            <!-- 页面标题和操作按钮 -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1">用户列表</h2>
                    <p class="text-muted mb-0">查看所有注册用户信息</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('admin_page') }}" class="btn btn-outline-secondary">
                        <i class="fa fa-arrow-left me-2"></i>返回控制台
                    </a>
                    <a href="{{ url_for('admin_user_management_page') }}" class="btn btn-primary">
                        <i class="fa fa-cog me-2"></i>用户管理
                    </a>
                </div>
            </div>

            <!-- 统计信息卡片 -->
            <div class="stats-cards mb-4">
                <div class="stat-card">
                    <div class="stat-icon primary">
                        <i class="fa fa-users"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalUsers">0</h3>
                        <p>用户总数</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon success">
                        <i class="fa fa-user-shield"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="adminUsers">0</h3>
                        <p>管理员</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon warning">
                        <i class="fa fa-user"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="normalUsers">0</h3>
                        <p>普通用户</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon danger">
                        <i class="fa fa-calendar"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="todayUsers">0</h3>
                        <p>今日注册</p>
                    </div>
                </div>
            </div>

            <!-- 搜索筛选区域 -->
            <div class="search-filter mb-4">
                <div class="filter-row">
                    <div class="filter-group">
                        <select id="roleFilter" class="filter-select">
                            <option value="all">全部角色</option>
                            <option value="admin">管理员</option>
                            <option value="user">普通用户</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <select id="timeFilter" class="filter-select">
                            <option value="all">全部时间</option>
                            <option value="today">今日</option>
                            <option value="week">本周</option>
                            <option value="month">本月</option>
                        </select>
                    </div>
                    <div class="search-input-group">
                        <input type="text" id="userSearchInput" placeholder="输入用户名或邮箱" class="search-input">
                        <button class="search-btn" onclick="searchUsers()">
                            <i class="fa fa-search"></i> 搜索
                        </button>
                    </div>
                </div>
            </div>

            <!-- 用户列表 -->
            <div class="content-area">
                <div class="data-table">
                    <table>
                        <thead>
                            <tr>
                                <th>用户ID</th>
                                <th>用户名</th>
                                <th>邮箱</th>
                                <th>手机号</th>
                                <th>角色</th>
                                <th>注册时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- 用户数据将通过JavaScript动态加载 -->
                        </tbody>
                    </table>
                </div>
                <div id="users-empty-state" class="empty-state">
                    <div class="stat-card empty-state-card">
                        <div class="stat-icon primary">
                            <i class="fa fa-user-minus"></i>
                        </div>
                        <div class="stat-info">
                            <h3>未找到符合条件的用户</h3>
                            <p>尝试调整筛选条件或搜索其他关键词</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 分页控制 -->
            <div class="pagination-container mt-4">
                <div class="pagination-info">
                    <span id="pagination-info-text">显示 1-0 条，共 0 条</span>
                </div>
                <div class="pagination-controls">
                    <select id="page-size-select" onchange="loadUsers(1)">
                        <option value="10">10条/页</option>
                        <option value="20">20条/页</option>
                        <option value="50">50条/页</option>
                    </select>
                    <div class="pagination-buttons">
                        <button class="btn btn-sm btn-outline-secondary" id="prev-page-btn" onclick="changePage(-1)" disabled>
                            <i class="fas fa-chevron-left"></i> 上一页
                        </button>
                        <span id="page-indicator">第 1 页</span>
                        <button class="btn btn-sm btn-outline-secondary" id="next-page-btn" onclick="changePage(1)" disabled>
                            下一页 <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentPage = 1;
        let pageSize = 10;
        let totalUsers = 0;
        let allUsers = [];

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            loadUsers();
            initSidebarToggle();
        });

        // 加载用户数据
        async function loadUsers(page = 1) {
            currentPage = page || 1;
            const pageSizeSelect = document.getElementById('page-size-select');
            pageSize = pageSizeSelect ? parseInt(pageSizeSelect.value) || 10 : 10;
            
            try {
                const response = await fetch('/api/admin/users', {
                    credentials: 'include'
                });
                
                if (!response.ok) {
                    throw new Error('获取用户数据失败');
                }
                
                const result = await response.json();
                allUsers = result.users || [];
                
                // 应用筛选
                const filteredUsers = applyFilters(allUsers);
                
                // 更新统计信息
                updateStats(allUsers);
                
                // 更新总数
                totalUsers = filteredUsers.length;
                
                // 分页
                const startIndex = (currentPage - 1) * pageSize;
                const endIndex = startIndex + pageSize;
                const paginatedUsers = filteredUsers.slice(startIndex, endIndex);
                
                // 渲染表格
                renderUsersTable(paginatedUsers);
                
                // 更新分页信息
                updatePaginationInfo();
            } catch (error) {
                console.error('加载用户数据失败:', error);
                alert('加载用户数据失败，请稍后重试');
            }
        }

        // 应用筛选条件
        function applyFilters(users) {
            const role = document.getElementById('roleFilter').value;
            const timeRange = document.getElementById('timeFilter').value;
            const search = document.getElementById('userSearchInput').value.trim().toLowerCase();
            
            return users.filter(user => {
                // 角色筛选
                if (role !== 'all') {
                    const isAdmin = user.is_admin || false;
                    if (role === 'admin' && !isAdmin) return false;
                    if (role === 'user' && isAdmin) return false;
                }
                
                // 时间筛选
                if (timeRange !== 'all' && user.created_at) {
                    const userDate = new Date(user.created_at);
                    const now = new Date();
                    let startTime;
                    
                    switch (timeRange) {
                        case 'today':
                            startTime = new Date(now.setHours(0, 0, 0, 0));
                            break;
                        case 'week':
                            startTime = new Date(now);
                            startTime.setDate(now.getDate() - now.getDay());
                            startTime.setHours(0, 0, 0, 0);
                            break;
                        case 'month':
                            startTime = new Date(now.getFullYear(), now.getMonth(), 1);
                            break;
                    }
                    
                    if (userDate < startTime) return false;
                }
                
                // 搜索筛选
                if (search) {
                    const usernameMatch = user.username.toLowerCase().includes(search);
                    const emailMatch = user.email ? user.email.toLowerCase().includes(search) : false;
                    
                    if (!usernameMatch && !emailMatch) return false;
                }
                
                return true;
            });
        }

        // 更新统计信息
        function updateStats(users) {
            const total = users.length;
            const admins = users.filter(u => u.is_admin).length;
            const normal = total - admins;
            
            // 计算今日注册用户
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const todayUsers = users.filter(u => {
                if (!u.created_at) return false;
                const userDate = new Date(u.created_at);
                userDate.setHours(0, 0, 0, 0);
                return userDate.getTime() === today.getTime();
            }).length;
            
            document.getElementById('totalUsers').textContent = total;
            document.getElementById('adminUsers').textContent = admins;
            document.getElementById('normalUsers').textContent = normal;
            document.getElementById('todayUsers').textContent = todayUsers;
        }

        // 渲染用户表格
        function renderUsersTable(users) {
            const tbody = document.getElementById('users-table-body');
            const emptyState = document.getElementById('users-empty-state');
            const table = document.querySelector('.data-table');
            
            if (!tbody) return;
            
            if (users.length === 0) {
                tbody.innerHTML = '';
                if (table) table.style.display = 'none';
                if (emptyState) {
                    emptyState.style.display = 'block';
                    emptyState.classList.add('active');
                }
                return;
            }
            
            if (table) table.style.display = 'block';
            if (emptyState) {
                emptyState.style.display = 'none';
                emptyState.classList.remove('active');
            }
            
            let tbodyHTML = '';
            users.forEach(user => {
                const roleBadge = user.is_admin 
                    ? '<span class="badge bg-primary">管理员</span>' 
                    : '<span class="badge bg-secondary">普通用户</span>';
                
                tbodyHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td><strong>${escapeHtml(user.username || '')}</strong></td>
                        <td>${escapeHtml(user.email || '-')}</td>
                        <td>${escapeHtml(user.phone || '-')}</td>
                        <td>${roleBadge}</td>
                        <td>${formatDate(user.created_at || '')}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn-small view" title="查看" onclick="viewUser('${user.id}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <a href="{{ url_for('admin_user_management_page') }}" class="action-btn-small edit" title="编辑">
                                    <i class="fas fa-edit"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tbody.innerHTML = tbodyHTML;
        }

        // 搜索用户
        function searchUsers() {
            currentPage = 1;
            loadUsers(1);
        }

        // 更新分页信息
        function updatePaginationInfo() {
            const totalPages = Math.ceil(totalUsers / pageSize);
            const startItem = totalUsers > 0 ? (currentPage - 1) * pageSize + 1 : 0;
            const endItem = Math.min(currentPage * pageSize, totalUsers);
            
            document.getElementById('pagination-info-text').textContent = 
                `显示 ${startItem}-${endItem} 条，共 ${totalUsers} 条`;
            
            document.getElementById('page-indicator').textContent = 
                `第 ${currentPage} 页 / 共 ${totalPages} 页`;
            
            document.getElementById('prev-page-btn').disabled = currentPage <= 1;
            document.getElementById('next-page-btn').disabled = currentPage >= totalPages;
        }

        // 切换页面
        function changePage(direction) {
            const totalPages = Math.ceil(totalUsers / pageSize);
            let newPage = currentPage + direction;
            
            if (newPage >= 1 && newPage <= totalPages) {
                loadUsers(newPage);
            }
        }

        // HTML转义函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 查看用户
        function viewUser(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (user) {
                alert(`用户详情：\nID: ${user.id}\n用户名: ${user.username}\n邮箱: ${user.email || '未设置'}\n手机: ${user.phone || '未设置'}\n角色: ${user.is_admin ? '管理员' : '普通用户'}\n注册时间: ${formatDate(user.created_at)}`);
            }
        }

        // 初始化侧边栏切换
        function initSidebarToggle() {
            const sidebarToggle = document.querySelector('.sidebar-toggle');
            const sidebar = document.querySelector('.sidebar');
            
            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                });
            }
        }

        // 监听筛选条件变化
        document.getElementById('roleFilter').addEventListener('change', function() {
            currentPage = 1;
            loadUsers(1);
        });

        document.getElementById('timeFilter').addEventListener('change', function() {
            currentPage = 1;
            loadUsers(1);
        });
    </script>
</body>
</html>

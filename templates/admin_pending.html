<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待处理任务 - 管理员控制台</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 样式文件 -->
    <link href="{{ url_for('static', filename='css/variables.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/global.css') }}?v=1.0" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/admin.css') }}?v=2.0" rel="stylesheet">
</head>
<body class="admin-body">
    <!-- 侧边栏导航 -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="校园书递" class="sidebar-logo">
            <span class="sidebar-title">校园书递</span>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li class="nav-item">
                    <a href="{{ url_for('admin_page') }}" class="nav-link">
                        <i class="fa fa-dashboard"></i>
                        <span>控制台</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_book_management_page') }}" class="nav-link">
                        <i class="fa fa-book"></i>
                        <span>书籍管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_user_management_page') }}" class="nav-link">
                        <i class="fa fa-users"></i>
                        <span>用户管理</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_analytics_page') }}" class="nav-link">
                        <i class="fa fa-bar-chart"></i>
                        <span>数据分析</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{{ url_for('admin_settings_page') }}" class="nav-link">
                        <i class="fa fa-cog"></i>
                        <span>系统设置</span>
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <!-- 顶部导航栏 -->
    <header class="top-navbar">
        <div class="header-left">
            <button class="sidebar-toggle">
                <i class="fa fa-bars"></i>
            </button>
            <div class="brand-container">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="校园书递" class="logo-btn">
                <span class="page-title">待处理任务</span>
            </div>
        </div>
        <div class="header-right">
            <div class="user-profile">
                <img src="{{ url_for('static', filename='img/logo.png') }}" alt="管理员头像" class="avatar">
                <span class="username">{{ username }}</span>
                <i class="fa fa-chevron-down"></i>
            </div>
        </div>
    </header>

    <!-- 主内容区域 -->
    <main class="main-content">
        <div class="container-fluid">
            <!-- 页面标题和操作按钮 -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-1">待处理任务</h2>
                    <p class="text-muted mb-0">处理待审核的订单和书籍</p>
                </div>
                <div class="d-flex gap-2">
                    <a href="{{ url_for('admin_page') }}" class="btn btn-outline-secondary">
                        <i class="fa fa-arrow-left me-2"></i>返回控制台
                    </a>
                </div>
            </div>

            <!-- 统计信息卡片 -->
            <div class="stats-cards mb-4">
                <div class="stat-card">
                    <div class="stat-icon danger">
                        <i class="fa fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="pendingOrders">0</h3>
                        <p>待处理订单</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon warning">
                        <i class="fa fa-book"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="pendingBooks">0</h3>
                        <p>待审核书籍</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon primary">
                        <i class="fa fa-comments"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="pendingReviews">0</h3>
                        <p>待审核评论</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon success">
                        <i class="fa fa-exclamation-triangle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalPending">0</h3>
                        <p>总待处理数</p>
                    </div>
                </div>
            </div>

            <!-- 标签页切换 -->
            <ul class="nav nav-tabs mb-4" id="pendingTabs" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="orders-tab" data-bs-toggle="tab" data-bs-target="#orders" type="button" role="tab">
                        <i class="fa fa-shopping-cart me-2"></i>待处理订单
                    </button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link" id="books-tab" data-bs-toggle="tab" data-bs-target="#books" type="button" role="tab">
                        <i class="fa fa-book me-2"></i>待审核书籍
                    </button>
                </li>
            </ul>

            <!-- 标签页内容 -->
            <div class="tab-content" id="pendingTabContent">
                <!-- 待处理订单 -->
                <div class="tab-pane fade show active" id="orders" role="tabpanel">
                    <div class="search-filter mb-4">
                        <div class="filter-row">
                            <div class="search-input-group">
                                <input type="text" id="orderSearchInput" placeholder="输入订单ID、买家或卖家" class="search-input">
                                <button class="search-btn" onclick="searchPendingOrders()">
                                    <i class="fa fa-search"></i> 搜索
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="content-area">
                        <div class="data-table">
                            <table>
                                <thead>
                                    <tr>
                                        <th>订单ID</th>
                                        <th>书籍名称</th>
                                        <th>买家</th>
                                        <th>卖家</th>
                                        <th>价格</th>
                                        <th>创建时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="pending-orders-table-body">
                                    <!-- 订单数据将通过JavaScript动态加载 -->
                                </tbody>
                            </table>
                        </div>
                        <div id="pending-orders-empty-state" class="empty-state">
                            <div class="stat-card empty-state-card">
                                <div class="stat-icon primary">
                                    <i class="fa fa-check-circle"></i>
                                </div>
                                <div class="stat-info">
                                    <h3>暂无待处理订单</h3>
                                    <p>所有订单已处理完成</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 待审核书籍 -->
                <div class="tab-pane fade" id="books" role="tabpanel">
                    <div class="search-filter mb-4">
                        <div class="filter-row">
                            <div class="search-input-group">
                                <input type="text" id="bookSearchInput" placeholder="输入书名或作者" class="search-input">
                                <button class="search-btn" onclick="searchPendingBooks()">
                                    <i class="fa fa-search"></i> 搜索
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="content-area">
                        <div class="data-table">
                            <table>
                                <thead>
                                    <tr>
                                        <th>书籍ID</th>
                                        <th>书名</th>
                                        <th>作者</th>
                                        <th>分类</th>
                                        <th>价格</th>
                                        <th>发布者</th>
                                        <th>发布时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="pending-books-table-body">
                                    <!-- 书籍数据将通过JavaScript动态加载 -->
                                </tbody>
                            </table>
                        </div>
                        <div id="pending-books-empty-state" class="empty-state">
                            <div class="stat-card empty-state-card">
                                <div class="stat-icon primary">
                                    <i class="fa fa-check-circle"></i>
                                </div>
                                <div class="stat-info">
                                    <h3>暂无待审核书籍</h3>
                                    <p>所有书籍已审核完成</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let allOrders = [];
        let allBooks = [];

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            loadPendingData();
            initSidebarToggle();
        });

        // 加载待处理数据
        async function loadPendingData() {
            try {
                // 加载订单数据
                const ordersResponse = await fetch('/api/admin/orders', {
                    credentials: 'include'
                });
                if (ordersResponse.ok) {
                    const ordersResult = await ordersResponse.json();
                    allOrders = ordersResult.orders || [];
                }

                // 加载书籍数据
                const booksResponse = await fetch('/api/books', {
                    credentials: 'include'
                });
                if (booksResponse.ok) {
                    const booksResult = await booksResponse.json();
                    allBooks = booksResult.books || [];
                }

                // 更新统计信息
                updateStats();

                // 渲染待处理订单
                renderPendingOrders();

                // 渲染待审核书籍
                renderPendingBooks();
            } catch (error) {
                console.error('加载待处理数据失败:', error);
                alert('加载待处理数据失败，请稍后重试');
            }
        }

        // 更新统计信息
        function updateStats() {
            const pendingOrders = allOrders.filter(o => o.status === 'pending').length;
            const pendingBooks = allBooks.filter(b => b.status === 'pending').length;
            const totalPending = pendingOrders + pendingBooks;

            document.getElementById('pendingOrders').textContent = pendingOrders;
            document.getElementById('pendingBooks').textContent = pendingBooks;
            document.getElementById('pendingReviews').textContent = 0; // 暂时没有评论审核功能
            document.getElementById('totalPending').textContent = totalPending;
        }

        // 渲染待处理订单
        function renderPendingOrders() {
            const pendingOrders = allOrders.filter(o => o.status === 'pending');
            const search = document.getElementById('orderSearchInput').value.trim().toLowerCase();
            
            let filteredOrders = pendingOrders;
            if (search) {
                filteredOrders = pendingOrders.filter(order => {
                    const idMatch = order.id.toString().includes(search);
                    const buyerMatch = order.buyer_name ? order.buyer_name.toLowerCase().includes(search) : false;
                    const sellerMatch = order.seller_name ? order.seller_name.toLowerCase().includes(search) : false;
                    return idMatch || buyerMatch || sellerMatch;
                });
            }

            const tbody = document.getElementById('pending-orders-table-body');
            const emptyState = document.getElementById('pending-orders-empty-state');
            const table = document.querySelector('#orders .data-table');

            if (filteredOrders.length === 0) {
                tbody.innerHTML = '';
                if (table) table.style.display = 'none';
                if (emptyState) {
                    emptyState.style.display = 'block';
                    emptyState.classList.add('active');
                }
                return;
            }

            if (table) table.style.display = 'block';
            if (emptyState) {
                emptyState.style.display = 'none';
                emptyState.classList.remove('active');
            }

            let tbodyHTML = '';
            filteredOrders.forEach(order => {
                tbodyHTML += `
                    <tr>
                        <td>${order.id}</td>
                        <td><strong>${escapeHtml(order.book_title || '')}</strong></td>
                        <td>${escapeHtml(order.buyer_name || '-')}</td>
                        <td>${escapeHtml(order.seller_name || '-')}</td>
                        <td>¥${parseFloat(order.price || 0).toFixed(2)}</td>
                        <td>${formatDate(order.created_at || '')}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn-small success" title="通过" onclick="approveOrder('${order.id}')">
                                    <i class="fas fa-check"></i>
                                </button>
                                <button class="action-btn-small danger" title="拒绝" onclick="rejectOrder('${order.id}')">
                                    <i class="fas fa-times"></i>
                                </button>
                                <button class="action-btn-small view" title="查看详情" onclick="viewOrder('${order.id}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = tbodyHTML;
        }

        // 渲染待审核书籍
        function renderPendingBooks() {
            const pendingBooks = allBooks.filter(b => b.status === 'pending');
            const search = document.getElementById('bookSearchInput').value.trim().toLowerCase();
            
            let filteredBooks = pendingBooks;
            if (search) {
                filteredBooks = pendingBooks.filter(book => {
                    const titleMatch = book.title.toLowerCase().includes(search);
                    const authorMatch = book.author ? book.author.toLowerCase().includes(search) : false;
                    return titleMatch || authorMatch;
                });
            }

            const tbody = document.getElementById('pending-books-table-body');
            const emptyState = document.getElementById('pending-books-empty-state');
            const table = document.querySelector('#books .data-table');

            if (filteredBooks.length === 0) {
                tbody.innerHTML = '';
                if (table) table.style.display = 'none';
                if (emptyState) {
                    emptyState.style.display = 'block';
                    emptyState.classList.add('active');
                }
                return;
            }

            if (table) table.style.display = 'block';
            if (emptyState) {
                emptyState.style.display = 'none';
                emptyState.classList.remove('active');
            }

            let tbodyHTML = '';
            filteredBooks.forEach(book => {
                tbodyHTML += `
                    <tr>
                        <td>${book.id}</td>
                        <td><strong>${escapeHtml(book.title || '')}</strong></td>
                        <td>${escapeHtml(book.author || '-')}</td>
                        <td>${escapeHtml(book.category || '-')}</td>
                        <td>¥${parseFloat(book.price || 0).toFixed(2)}</td>
                        <td>${escapeHtml(book.owner_name || '-')}</td>
                        <td>${formatDate(book.created_at || '')}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="action-btn-small success" title="通过" onclick="approveBook('${book.id}')">
                                    <i class="fas fa-check"></i>
                                </button>
                                <button class="action-btn-small danger" title="拒绝" onclick="rejectBook('${book.id}')">
                                    <i class="fas fa-times"></i>
                                </button>
                                <button class="action-btn-small view" title="查看详情" onclick="viewBook('${book.id}')">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = tbodyHTML;
        }

        // 搜索待处理订单
        function searchPendingOrders() {
            renderPendingOrders();
        }

        // 搜索待审核书籍
        function searchPendingBooks() {
            renderPendingBooks();
        }

        // 通过订单
        async function approveOrder(orderId) {
            if (!confirm('确定要通过此订单吗？')) return;

            try {
                const response = await fetch(`/api/orders/${orderId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ status: 'completed' })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    alert('订单已通过');
                    loadPendingData();
                } else {
                    alert('操作失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('通过订单失败:', error);
                alert('操作失败，请稍后重试');
            }
        }

        // 拒绝订单
        async function rejectOrder(orderId) {
            if (!confirm('确定要拒绝此订单吗？')) return;

            try {
                const response = await fetch(`/api/orders/${orderId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ status: 'cancelled' })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    alert('订单已拒绝');
                    loadPendingData();
                } else {
                    alert('操作失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('拒绝订单失败:', error);
                alert('操作失败，请稍后重试');
            }
        }

        // 通过书籍
        async function approveBook(bookId) {
            if (!confirm('确定要通过此书籍吗？')) return;

            try {
                const response = await fetch(`/api/books/${bookId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ status: 'available' })
                });

                const result = await response.json();
                if (result.status === 'success') {
                    alert('书籍已通过审核');
                    loadPendingData();
                } else {
                    alert('操作失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('通过书籍失败:', error);
                alert('操作失败，请稍后重试');
            }
        }

        // 拒绝书籍
        async function rejectBook(bookId) {
            if (!confirm('确定要拒绝此书籍吗？书籍将被删除。')) return;

            try {
                const response = await fetch(`/api/books/${bookId}`, {
                    method: 'DELETE',
                    credentials: 'include'
                });

                const result = await response.json();
                if (result.status === 'success') {
                    alert('书籍已拒绝并删除');
                    loadPendingData();
                } else {
                    alert('操作失败：' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('拒绝书籍失败:', error);
                alert('操作失败，请稍后重试');
            }
        }

        // 查看订单
        function viewOrder(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (order) {
                alert(`订单详情：\n订单ID: ${order.id}\n书籍: ${order.book_title}\n买家: ${order.buyer_name}\n卖家: ${order.seller_name}\n价格: ¥${parseFloat(order.price || 0).toFixed(2)}\n状态: ${order.status}\n创建时间: ${formatDate(order.created_at)}`);
            }
        }

        // 查看书籍
        function viewBook(bookId) {
            window.location.href = `/book/${bookId}`;
        }

        // HTML转义函数
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // 初始化侧边栏切换
        function initSidebarToggle() {
            const sidebarToggle = document.querySelector('.sidebar-toggle');
            const sidebar = document.querySelector('.sidebar');
            
            if (sidebarToggle && sidebar) {
                sidebarToggle.addEventListener('click', function() {
                    sidebar.classList.toggle('collapsed');
                });
            }
        }
    </script>
</body>
</html>

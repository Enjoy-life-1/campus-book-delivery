<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情 - 校园书递</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/orderDetails.css?v=1.0">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa fa-book"></i> 校园书递
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/booksList">全部书籍</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/publishBook">发布书籍</a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <div id="userMenu" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa fa-user text-primary"></i> <span id="username">我的账户</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/personalCenter">个人中心</a></li>
                            <li><a class="dropdown-item" href="/myBooks">我的书籍</a></li>
                            <li><a class="dropdown-item" href="/myCollections">我的收藏</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/login"><i class="fa fa-lock"></i> 管理员登录</a></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtn">退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container section-container">
        <div class="order-header">
            <h2 class="section-title">订单详情</h2>
            <a href="/transactionHistory" class="back-link">
                <i class="fa fa-arrow-left"></i> 返回交易记录
            </a>
        </div>
        
        <div id="loadingContainer" class="loading-container">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
            <p>正在加载订单信息...</p>
        </div>
        
        <div id="orderContainer" class="order-container" style="display: none;">
            <!-- 订单信息卡片 -->
            <div class="order-card">
                <div class="order-status-section">
                    <div class="status-badge" id="statusBadge">
                        <i class="fa fa-clock-o"></i>
                        <span id="statusText">待处理</span>
                    </div>
                    <p class="order-id">订单号: <span id="orderId"></span></p>
                    <p class="order-date">创建时间: <span id="orderDate"></span></p>
                </div>
                
                <div class="order-content">
                    <!-- 书籍信息 -->
                    <div class="book-info-section">
                        <h4 class="section-subtitle">书籍信息</h4>
                        <div class="book-detail-card">
                            <div class="book-image">
                                <img id="bookImage" src="" alt="书籍封面">
                            </div>
                            <div class="book-details">
                                <h5 id="bookTitle"></h5>
                                <p class="book-price">价格: <span class="price">￥<span id="bookPrice"></span></span></p>
                                <button class="btn-view-book" onclick="viewBookDetail()">查看书籍详情</button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 交易双方信息 -->
                    <div class="parties-info-section">
                        <div class="party-card">
                            <h4 class="section-subtitle">卖家信息</h4>
                            <div class="party-details">
                                <p><strong>姓名:</strong> <span id="sellerName"></span></p>
                                <p><strong>ID:</strong> <span id="sellerId"></span></p>
                            </div>
                        </div>
                        <div class="party-card">
                            <h4 class="section-subtitle">买家信息</h4>
                            <div class="party-details">
                                <p><strong>姓名:</strong> <span id="buyerName"></span></p>
                                <p><strong>ID:</strong> <span id="buyerId"></span></p>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 操作按钮区域 -->
                    <div class="action-buttons-section" id="actionButtonsSection">
                        <button id="shippedBtn" class="btn-action btn-shipped" style="display: none;">
                            <i class="fa fa-truck"></i> 已发货
                        </button>
                        <button id="receivedBtn" class="btn-action btn-received" style="display: none;">
                            <i class="fa fa-check-circle"></i> 已收货
                        </button>
                    </div>
                    
                    <!-- 评价区域 -->
                    <div class="review-section" id="reviewSection" style="display: none;">
                        <h4 class="section-subtitle">评价</h4>
                        <div id="reviewFormContainer">
                            <form id="reviewForm">
                                <div class="review-item">
                                    <label>服务态度</label>
                                    <div class="star-rating">
                                        <i class="fa fa-star" data-rating="1"></i>
                                        <i class="fa fa-star" data-rating="2"></i>
                                        <i class="fa fa-star" data-rating="3"></i>
                                        <i class="fa fa-star" data-rating="4"></i>
                                        <i class="fa fa-star" data-rating="5"></i>
                                    </div>
                                    <input type="hidden" id="serviceRating" name="service_rating" value="0">
                                </div>
                                
                                <div class="review-item">
                                    <label>书籍品相与描述是否一致</label>
                                    <div class="star-rating">
                                        <i class="fa fa-star" data-rating="1"></i>
                                        <i class="fa fa-star" data-rating="2"></i>
                                        <i class="fa fa-star" data-rating="3"></i>
                                        <i class="fa fa-star" data-rating="4"></i>
                                        <i class="fa fa-star" data-rating="5"></i>
                                    </div>
                                    <input type="hidden" id="conditionRating" name="condition_rating" value="0">
                                </div>
                                
                                <div class="review-item">
                                    <label>交易效率</label>
                                    <div class="star-rating">
                                        <i class="fa fa-star" data-rating="1"></i>
                                        <i class="fa fa-star" data-rating="2"></i>
                                        <i class="fa fa-star" data-rating="3"></i>
                                        <i class="fa fa-star" data-rating="4"></i>
                                        <i class="fa fa-star" data-rating="5"></i>
                                    </div>
                                    <input type="hidden" id="efficiencyRating" name="efficiency_rating" value="0">
                                </div>
                                
                                <div class="review-item">
                                    <label>评价内容</label>
                                    <textarea id="reviewContent" name="review_content" rows="4" placeholder="请输入您的评价..."></textarea>
                                </div>
                                
                                <button type="submit" class="btn-submit-review">提交评价</button>
                            </form>
                        </div>
                        
                        <!-- 已评价显示 -->
                        <div id="reviewDisplay" style="display: none;">
                            <div class="review-display-card">
                                <h5>我的评价</h5>
                                <div class="review-display-content" id="reviewDisplayContent"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="orderListContainer" class="order-list-container" style="display: none;">
            <h3 class="section-subtitle">选择要查看的订单</h3>
            <div id="orderList" class="order-list">
                <!-- 订单列表将通过JS动态生成 -->
            </div>
        </div>
        
        <div id="errorContainer" class="error-container" style="display: none;">
            <div class="alert alert-danger">
                <h4>加载失败</h4>
                <p id="errorMessage"></p>
                <button class="btn btn-primary" onclick="location.reload()">重新加载</button>
            </div>
        </div>
    </div>

    <!-- 先引入jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 然后引入Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script src="{{ url_for('static', filename='js/orderDetails.js') }}"></script>
</body>
</html>

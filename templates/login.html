<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园书递 - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/variables.css', v='1.0') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/base.css', v='1.0') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/login.css', v='1.0') }}" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <!-- 左侧品牌区域 -->
        <div class="brand-side">
            <div class="brand-logo">
                <img src="../static/img/logo.png" alt="校园书递Logo">
            </div>
            <h1 class="brand-title">校园书递</h1>
            <div class="brand-slogan">
                专注于校园二手书籍交易，让闲置教材焕发新价值<br>
                为大学生提供安全、便捷、高效的书籍交易平台
            </div>
            <div class="brand-illustration">
                <img src="../static/img/520.jpg" alt="书籍交易插图">
            </div>
        </div>

        <!-- 右侧表单区域 -->
        <div class="form-side">
            <div class="form-header">
                <h2>欢迎使用校园书递</h2>
                <p>请登录您的账号继续使用</p>
            </div>

            <!-- 身份选择 -->
            <div class="identity-select">
                <div class="identity-btn active" id="student-btn" data-role="student">学生</div>
                <div class="identity-btn" id="admin-btn" data-role="admin">管理员</div>
            </div>

            <!-- 登录表单 -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="username">账号</label>
                    <input type="text" id="username" name="username" class="form-control" placeholder="请输入学号" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="请输入密码" required>
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe"> 
                        <label for="rememberMe">记住我（7天）</label>
                    </div>
                    <div>
                        <a href="/register" class="register-link">注册账号</a>
                        <a href="#" class="forgot-password" id="forgotPasswordLink">忘记密码?</a>
                    </div>
                </div>

                <div class="login-error" id="loginError"></div>
                <!-- 确保按钮正确定义为submit类型 -->
                <button type="submit" id="login-submit" class="login-btn" aria-label="立即登录">
                    <i class="fa fa-sign-in"></i> 立即登录
                </button>

                <div class="sms-login-prompt">
                    手机验证码登录
                </div>
            </form>
            <div id="smsLoginForm" class="login-form" style="display: none;">
                <div class="form-group">
                    <label for="smsPhone">手机号</label>
                    <input type="tel" id="smsPhone" class="form-control" placeholder="请输入手机号" required>
                </div>
                <div class="form-group">
                    <label for="smsCode">验证码</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="smsCode" class="form-control" placeholder="请输入验证码" required>
                        <button type="button" id="getSmsCode" class="btn btn-secondary" style="min-width: 120px;">获取验证码</button>
                    </div>
                </div>
                <div class="login-error" id="smsLoginError"></div>
                <button type="button" id="smsLoginSubmit" class="login-btn">
                    <i class="fa fa-mobile"></i> 验证码登录
                </button>
                <div class="password-login-prompt" style="text-align: center; margin-top: 1.2rem; cursor: pointer;">
                    密码登录
                </div>
            </div>
        </div>
    </div>

    <!-- 忘记密码模态框 - 移到容器外部以确保正确显示 -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="forgotPasswordModalLabel">找回密码</h5>
                    <button type="button" class="btn-close" id="closeForgotModalBtn" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label for="resetPhone">手机号</label>
                        <input type="tel" id="resetPhone" class="form-control" placeholder="请输入注册手机号" required>
                    </div>
                    <div class="form-group">
                        <label for="resetCode">验证码</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="resetCode" class="form-control" placeholder="请输入验证码" required>
                            <button type="button" id="getResetCode" class="btn btn-secondary" style="min-width: 120px;">获取验证码</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <input type="password" id="newPassword" class="form-control" placeholder="请输入新密码" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="cancelResetBtn" data-bs-dismiss="modal">取消</button>
                    <button type="button" id="resetPasswordSubmit" class="btn btn-primary">重置密码</button>
                </div>
            </div>
        </div>
    </div>


    <!-- 引入jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 引入Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 引入通用JS文件 -->
    <script src="../static/js/common.js"></script>
    <!-- 引入主JS文件 -->
    <script src="../static/js/main.js"></script>
    <!-- 引入页面JS文件 -->
    <script src="../static/js/login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账户设置 - 校园书递</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/variables.css', v='1.0') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/utils/base.css', v='1.0') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/accountSettings.css', v='1.0') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/components/navbar.css', v='1.0') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fa fa-book"></i> 校园书递
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/booksList">全部书籍</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/guide">交易指南</a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <a class="nav-link me-3" href="/publishBook">
                        <i class="fa fa-plus-circle text-primary"></i> 发布书籍
                    </a>
                    <div id="userMenu" class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="fa fa-user text-primary"></i> <span id="username">我的账户</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/personalCenter">个人中心</a></li>
                            <li><a class="dropdown-item" href="/myBooks">我的书籍</a></li>
                            <li><a class="dropdown-item" href="/myCollections">我的收藏</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="/login"><i class="fa fa-lock"></i> 管理员登录</a></li>
                            <li><a class="dropdown-item" href="#" id="logoutBtnMenu">退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container section-container">
        <h2 class="section-title">账户设置</h2>

        <div class="form-alert alert-success" id="saveAlert">
            <i class="fa fa-check-circle"></i> 信息保存成功
        </div>

        <div class="settings-card">
            <h3>个人信息</h3>
            <div class="avatar-upload">
                <div class="avatar-preview">
                    <img src="https://picsum.photos/id/64/100/100" alt="用户头像" id="avatarImg">
                </div>
                <div>
                    <button class="avatar-upload-btn" id="changeAvatarBtn">
                        <i class="fa fa-upload"></i> 更换头像
                    </button>
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    <p class="text-gray" style="margin-top: 0.5rem; font-size: 0.9rem;">支持JPG、PNG格式，建议尺寸200x200px</p>
                </div>
            </div>

            <form id="profileForm">
                <div class="form-group">
                    <label class="form-label" for="usernameInput">用户名</label>
                    <input type="text" class="form-control" id="usernameInput" name="username" placeholder="请输入用户名">
                </div>

                <div class="form-group">
                    <label class="form-label" for="phoneInput">手机号码</label>
                    <input type="tel" class="form-control" id="phoneInput" name="phone" placeholder="请输入手机号码" readonly>
                    <p class="text-gray">手机号码用于登录，不可修改</p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="schoolInput">学校</label>
                    <input type="text" class="form-control" id="schoolInput" name="school" placeholder="请输入学校名称">
                </div>

                <div class="form-group">
                    <label class="form-label" for="introductionInput">个人简介</label>
                    <textarea class="form-control" id="introductionInput" name="introduction" rows="3" placeholder="简单介绍一下自己吧"></textarea>
                </div>

                <button type="submit" class="btn-save">保存修改</button>
            </form>
        </div>

        <div class="settings-card">
            <h3>账户安全</h3>

            <form id="securityForm">
                <div class="form-group">
                    <label class="form-label" for="oldPassword">当前密码</label>
                    <input type="password" class="form-control" id="oldPassword" name="oldPassword" placeholder="请输入当前密码">
                </div>

                <div class="form-group">
                    <label class="form-label" for="newPassword">新密码</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="请输入新密码">
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">确认新密码</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="请再次输入新密码">
                </div>

                <button type="submit" class="btn-save">修改密码</button>
            </form>
        </div>

        <div class="settings-card">
            <h3>账户操作</h3>
            <button class="logout-btn" id="logoutBtn">
                <i class="fa fa-sign-out"></i> 退出登录
            </button>
        </div>
    </div>

    <!-- 引入外部JavaScript文件 -->
    <!-- 先引入jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- 然后引入Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/common.js') }}"></script>
    <script src="{{ url_for('static', filename='js/global.js') }}"></script>
    <script src="{{ url_for('static', filename='js/accountSettings.js') }}"></script>
</body>
</html>
